<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="水果配對">
    
    <title>水果二選一</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --img-size: 400px; }
        body.theme-dark {
            --bg-color: #000000; --text-color: #FFFFFF; --border-color: #FFFFFF;
            --btn-bg: rgba(128, 128, 128, 0.15); --highlight-color: #FFFF00; --success-color: #00FF00;
        }
        body.theme-light {
            --bg-color: #FFFFFF; --text-color: #000000; --border-color: #000000;
            --btn-bg: #F5F5F5; --highlight-color: #D32F2F; --success-color: #2E7D32; 
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; transition: background-color 0.3s, color 0.3s;
            user-select: none; -webkit-user-select: none;
        }
        header { text-align: center; padding: 15px 0 5px 0; position: relative; flex-shrink: 0; }
        h1 { font-size: 45px; color: var(--highlight-color); margin: 0; letter-spacing: 5px; }
        #settings-btn {
            position: absolute; top: 15px; right: 20px; font-size: 30px; background: var(--bg-color);
            border: 3px solid var(--border-color); color: var(--text-color); border-radius: 15px;
            padding: 10px 20px; cursor: pointer; z-index: 100;
        }
        #prompt-area {
            text-align: center; font-size: 60px; margin-top: 5px; min-height: 80px;
            color: var(--success-color); font-weight: bold; flex-shrink: 0;
        }
        #options-container {
            display: flex; flex-direction: row; justify-content: center; align-items: stretch;
            flex-grow: 1; padding: 15px 30px 30px 30px; box-sizing: border-box; gap: 4vw; overflow: hidden;
        }
        .option-btn {
            background-color: var(--btn-bg); border: 8px solid var(--border-color); border-radius: 30px;
            padding: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center;
            justify-content: center; transition: transform 0.2s, opacity 0.3s, border-color 0.3s;
            box-sizing: border-box; flex: 1 1 0; max-width: var(--img-size); min-width: 0; min-height: 0;
        }
        .option-btn:active { transform: scale(0.95); border-color: var(--highlight-color); }
        .fruit-img {
            width: 100%; height: 100%; max-height: calc(100vh - 300px); object-fit: contain;
            background-color: #FFFFFF; border-radius: 15px; border: 2px solid #555; margin-bottom: 15px; min-height: 0;
        }
        .fruit-text { font-size: min(55px, 6vw); color: var(--text-color); font-weight: bold; letter-spacing: 3px; flex-shrink: 0; text-align: center; }
        .hide-text .fruit-text { display: none; }
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.98); color: #FFFFFF; z-index: 200; flex-direction: column;
            align-items: center; justify-content: flex-start; padding-top: 40px; overflow-y: auto; font-size: 30px;
        }
        .setting-section { background: #222; border: 3px solid #555; border-radius: 20px; padding: 20px 40px; margin-bottom: 20px; width: 85%; max-width: 900px; }
        .setting-row { margin: 15px 0; display: flex; align-items: center; justify-content: space-between; }
        .setting-row label { color: #FFFF00; font-weight: bold; }
        .setting-row select, .setting-row input[type="file"] { font-size: 30px; padding: 5px; cursor: pointer; max-width: 50%; }
        .fruit-checkboxes { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 15px; }
        .fruit-checkboxes label { color: #FFF; display: flex; align-items: center; cursor: pointer; }
        .fruit-checkboxes input[type="checkbox"] { transform: scale(2); margin-right: 20px; }
        .upload-section { margin-top: 20px; border-top: 2px solid #555; padding-top: 15px; }
        .upload-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .fruit-thumbnail { width: 80px; height: 80px; background-color: #FFF; border: 2px solid #555; border-radius: 10px; object-fit: contain; }
        .clear-upload-btn { font-size: 25px; padding: 5px 15px; background-color: #D32F2F; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #save-settings-btn { margin: 20px 0 50px 0; font-size: 45px; padding: 20px 60px; background-color: #00FF00; color: #000; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 300; display: flex; align-items: center; justify-content: center; }
        #start-btn { font-size: 80px; padding: 40px 80px; background-color: #FFFF00; color: #000; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 0 30px rgba(255, 255, 0, 0.5); }
    </style>
</head>
<body class="show-text theme-dark">

    <div id="start-screen">
        <button id="start-btn" onclick="startGame()">開始遊戲</button>
    </div>

    <div id="settings-modal">
        <h2 style="color:#FFF; font-size: 50px; margin-top:0;">遊戲設定</h2>
        
        <div class="setting-section">
            <div class="setting-row">
                <label>視覺模式：</label>
                <select id="setting-theme">
                    <option value="theme-dark" selected>高對比 (黑底白字)</option>
                    <option value="theme-light">標準 (白底黑字)</option>
                </select>
            </div>
            <div class="setting-row" style="justify-content: flex-start; gap: 40px;">
                <label>顯示文字：</label>
                <input type="checkbox" id="setting-text" checked style="transform: scale(2);">
            </div>
            <div class="setting-row">
                <label>圖片大小上限：</label>
                <select id="setting-size">
                    <option value="300px">大 (300px)</option>
                    <option value="450px" selected>極大 (450px)</option>
                    <option value="1000px">無限大 (適應螢幕)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>選擇數量：</label>
                <select id="setting-count">
                    <option value="1">一選一 (學習配對)</option>
                    <option value="2" selected>二選一</option>
                    <option value="3">三選一</option>
                </select>
            </div>
        </div>

        <div class="setting-section">
            <label style="color: #FFFF00; font-weight: bold;">選擇出現的水果：</label>
            <div class="fruit-checkboxes" id="fruit-checkbox-container"></div>
        </div>

        <div class="setting-section">
            <label style="color: #FFFF00; font-weight: bold;">導師上傳圖卡 (自動鎖定於此設備)：</label>
            <p style="font-size: 22px; color: #AAA; margin-top:5px;">為避免記憶體已滿，建議上傳前先將圖片裁切並壓縮至 100KB 以下。</p>
            <div class="upload-section" id="custom-upload-container"></div>
        </div>

        <button id="save-settings-btn" onclick="saveSettings()">儲存並關閉</button>
    </div>

    <header>
        <h1 id="game-title">水果二選一</h1>
        <button id="settings-btn" onclick="openSettings()">⚙️ 設定</button>
    </header>

    <div id="prompt-area"></div>
    <div id="options-container"></div>

    <script>
        let preferredVoice = null;

        function initBestVoice() {
            const voices = window.speechSynthesis.getVoices();
            let hkVoices = voices.filter(v => v.lang === 'zh-HK' || v.lang.includes('zh-HK'));
            
            if (hkVoices.length > 0) {
                preferredVoice = hkVoices.find(v => 
                    v.name.includes('Premium') || 
                    v.name.includes('Enhanced') || 
                    v.name.includes('Sin-Ji') || 
                    v.name.includes('倩兒')
                ) || hkVoices[0];
            }
        }
        window.speechSynthesis.onvoiceschanged = initBestVoice;

        function speakPrompt(text, callback) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-HK'; 
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 0.85; 
            utterance.pitch = 1.1; 
            if(callback) utterance.onend = callback;
            window.speechSynthesis.speak(utterance);
        }

        // =========================================
        // 【已修正】完美支援 Emoji 的預設圖卡生成器
        // =========================================
        function getSvgPlaceholder(emoji) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><rect width="100%" height="100%" fill="#FFFFFF"/><text x="50%" y="55%" font-size="200" text-anchor="middle" dominant-baseline="middle">${emoji}</text></svg>`;
            return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        }

        const allFruitsDB = [
            { id: "f1", name: "蘋果", img: getSvgPlaceholder("🍎") },
            { id: "f2", name: "香蕉", img: getSvgPlaceholder("🍌") },
            { id: "f3", name: "橙", img: getSvgPlaceholder("🍊") },
            { id: "f4", name: "提子", img: getSvgPlaceholder("🍇") },
            { id: "f5", name: "西瓜", img: getSvgPlaceholder("🍉") },
            { id: "f6", name: "士多啤梨", img: getSvgPlaceholder("🍓") },
            { id: "f7", name: "芒果", img: getSvgPlaceholder("🥭") },
            { id: "f8", name: "菠蘿", img: getSvgPlaceholder("🍍") },
            { id: "f9", name: "桃", img: getSvgPlaceholder("🍑") },
            { id: "f10", name: "奇異果", img: getSvgPlaceholder("🥝") }
        ];

        let activeFruitsDB = []; 
        let currentTarget = null;
        let isProcessing = false;
        let audioCtx;
        let customImageCache = {};

        function loadCustomImagesFromStorage() {
            try {
                const storedCustom = localStorage.getItem('fruitCustomImages');
                if (storedCustom) customImageCache = JSON.parse(storedCustom);
            } catch (e) {
                customImageCache = {};
            }
        }

        function saveCustomImagesToStorage() {
            try {
                localStorage.setItem('fruitCustomImages', JSON.stringify(customImageCache));
            } catch (e) {
                alert("圖片體積過大，無法儲存。請復原部分圖片或上傳壓縮過的小檔案。");
            }
        }

        function startGame() {
            document.getElementById("start-screen").style.display = "none";
            loadCustomImagesFromStorage(); 
            initSettingsPanels(); 
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const wakeVoice = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(wakeVoice);
            
            saveSettings(); 
        }

        function initSettingsPanels() {
            const cbContainer = document.getElementById("fruit-checkbox-container");
            const uploadContainer = document.getElementById("custom-upload-container");
            cbContainer.innerHTML = "";
            uploadContainer.innerHTML = "";

            allFruitsDB.forEach(fruit => {
                cbContainer.innerHTML += `
                    <label><input type="checkbox" value="${fruit.id}" class="fruit-cb" checked> ${fruit.name}</label>
                `;
                const imgSrc = customImageCache[fruit.id] || fruit.img;
                uploadContainer.innerHTML += `
                    <div class="upload-row">
                        <img src="${imgSrc}" id="thumb-${fruit.id}" class="fruit-thumbnail" draggable="false">
                        <label style="color:#FFFF00; width:120px;">${fruit.name}</label>
                        <input type="file" accept="image/*" onchange="uploadImageHandler('${fruit.id}', this)" style="max-width:35%;">
                        <button class="clear-upload-btn" onclick="clearSingleUpload('${fruit.id}')">復原</button>
                    </div>
                `;
            });
        }

        function uploadImageHandler(fruitId, fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Str = e.target.result;
                customImageCache[fruitId] = base64Str;
                document.getElementById(`thumb-${fruitId}`).src = base64Str;
                saveCustomImagesToStorage();
            };
            reader.readAsDataURL(file);
        }

        function clearSingleUpload(fruitId) {
            delete customImageCache[fruitId];
            const fruit = allFruitsDB.find(f => f.id === fruitId);
            document.getElementById(`thumb-${fruitId}`).src = fruit.img;
            saveCustomImagesToStorage();
        }

        function openSettings() {
            document.getElementById("settings-modal").style.display = "flex";
        }

        function saveSettings() {
            const choiceCount = parseInt(document.getElementById("setting-count").value);
            const checkboxes = document.querySelectorAll('.fruit-cb:checked');
            
            if (checkboxes.length < choiceCount) {
                alert(`請至少勾選 ${choiceCount} 種水果！`);
                return;
            }

            const theme = document.getElementById("setting-theme").value;
            document.body.className = ''; 
            document.body.classList.add(theme);

            const showText = document.getElementById("setting-text").checked;
            if (showText) document.body.classList.remove('hide-text');
            else document.body.classList.add('hide-text');

            const selectedIds = Array.from(checkboxes).map(cb => cb.value);
            activeFruitsDB = allFruitsDB.filter(f => selectedIds.includes(f.id)).map(fruit => {
                return { ...fruit, finalImg: customImageCache[fruit.id] || fruit.img };
            });

            const size = document.getElementById("setting-size").value;
            document.documentElement.style.setProperty('--img-size', size);

            const titleMap = {1: "水果配對", 2: "水果二選一", 3: "水果三選一"};
            document.getElementById("game-title").innerText = titleMap[choiceCount];
            
            document.getElementById("settings-modal").style.display = "none";
            generateQuestion(); 
        }

        function generateQuestion() {
            if (isProcessing) return;
            document.getElementById("prompt-area").innerText = "";
            document.getElementById("prompt-area").style.color = "var(--success-color)";

            const choiceCount = parseInt(document.getElementById("setting-count").value);
            let shuffledDB = [...activeFruitsDB].sort(() => 0.5 - Math.random());
            
            currentTarget = shuffledDB[0];
            let options = shuffledDB.slice(0, choiceCount).sort(() => 0.5 - Math.random());

            renderOptions(options);

            setTimeout(() => {
                speakPrompt(`我想食${currentTarget.name}，邊個係${currentTarget.name}啊？`);
            }, 500);
        }

        function renderOptions(options) {
            const container = document.getElementById("options-container");
            container.innerHTML = "";

            options.forEach(fruit => {
                const btn = document.createElement("div");
                btn.className = "option-btn";
                btn.onclick = () => checkAnswer(fruit, btn);
                btn.innerHTML = `
                    <img src="${fruit.finalImg}" alt="${fruit.name}" class="fruit-img" draggable="false">
                    <div class="fruit-text">${fruit.name}</div>
                `;
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedFruit, btnElement) {
            if (isProcessing) return;
            const promptArea = document.getElementById("prompt-area");

            if (selectedFruit.id === currentTarget.id) {
                isProcessing = true;
                promptArea.innerText = "答啱啦！";
                btnElement.style.borderColor = "var(--success-color)";
                promptArea.style.color = "var(--success-color)";
                
                triggerFirework();
                playEatingSound();
                speakPrompt(`啱啦！好好味！`);

                setTimeout(() => {
                    isProcessing = false;
                    generateQuestion();
                }, 2500);

            } else {
                promptArea.innerText = "再試一下";
                promptArea.style.color = "var(--highlight-color)";
                btnElement.style.opacity = "0.15"; 
                btnElement.onclick = null; 
                speakPrompt(`再試一下`);
            }
        }

        function playEatingSound() {
            if (!audioCtx) return;
            function createCrunch(timeOffset) {
                const bufferSize = audioCtx.sampleRate * 0.15;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'bandpass'; bandpass.frequency.value = 1200;
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime + timeOffset);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + timeOffset + 0.15);
                noise.connect(bandpass); bandpass.connect(gainNode); gainNode.connect(audioCtx.destination);
                noise.start(audioCtx.currentTime + timeOffset);
            }
            createCrunch(0); createCrunch(0.2); createCrunch(0.4);
        }

        function triggerFirework() {
            var duration = 1500; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 8, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFFF00', '#00FF00', '#FFFFFF'] });
                confetti({ particleCount: 8, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFFF00', '#00FF00', '#FFFFFF'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
